{% extends "layout.html" %}

{% block content %}

<div class="page-container" id="mainContent">
    <h1><i class="fas fa-plus"></i> Add Sale</h1>

    <a href="javascript:history.back()" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="table-card">
        <form method="POST">
            <select name="product_id" required>
                {% for product in products %}
                <option value="{{ product[0] }}">{{ product[1] }}</option>
                {% endfor %}
            </select>

            <input type="number" name="quantity" placeholder="Quantity Sold" required>
            <input type="number" step="0.01" name="selling_price" placeholder="Selling Price" required>
            <input type="text" name="customer_name" placeholder="Customer Name" required>
            <input type="date" name="sale_date" required>

            <button class="btn-green" type="submit">
                <i class="fas fa-check"></i> Save Sale
            </button>
        </form>
    </div>
</div>

{% endblock %}
