{% extends "layout.html" %}

{% block content %}

<div class="page-container" id="mainContent">
    <h1><i class="fas fa-pen-to-square"></i> Edit Product</h1>

    <a href="javascript:history.back()" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="table-card">
        <form method="POST">
            <input type="text" name="name" value="{{ product[1] }}" required>
            <input type="text" name="category" value="{{ product[2] }}" required>
            <input type="number" name="stock" value="{{ product[3] }}" required>
            <input type="number" step="0.01" name="price" value="{{ product[4] }}" required>

            <button class="btn-green" type="submit">
                <i class="fas fa-check"></i> Update Product
            </button>
        </form>
    </div>
</div>

{% endblock %}
