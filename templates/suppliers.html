{% extends "layout.html" %}

{% block content %}

<div class="page-container">

    <h1>🚚 Suppliers Management</h1>

    <a href="/dashboard" class="back-btn">
        ⬅ Dashboard
    </a>

    </a>
    <div class="table-card">

        <a href="/add-supplier">
            <button class="btn-green">
                + Add Supplier
            </button>
        </a>
        <a href="/export-purchases">
            <button class="btn-green">
                📥 Export CSV
            </button>
        </a>

        <br><br>

        <form method="GET">

            <input type="text" name="search" placeholder="Search Supplier">

            <button class="btn-green">
                Search
            </button>

        </form>

        <br>

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                {% for supplier in suppliers %}

                <tr>

                    <td>{{ supplier[0] }}</td>
                    <td>{{ supplier[1] }}</td>
                    <td>{{ supplier[2] }}</td>
                    <td>{{ supplier[3] }}</td>
                    <td>{{ supplier[4] }}</td>

                    <td>

                        <a href="/edit-supplier/{{ supplier.id }}" class="btn-edit">
                            <i class="fas fa-edit"></i>
                            Edit
                        </a>

                        |

                        <a href="/delete-supplier/{{ supplier.id }}" class="btn-delete"
                            onclick="return confirm('Delete this supplier?')">
                            <i class="fas fa-trash"></i>
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
