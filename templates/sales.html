{% extends "layout.html" %}

{% block content %}

<div class="page-container">

    <h1>💰 Sales</h1>
    <a href="javascript:history.back()" class="back-btn">

        ← Back

    </a>
    <div class="table-card">

        <a href="/add-sale">
            <button class="btn-green">
                + Add Sale
            </button>
        </a>

        <a href="/export-sales">
            <button class="btn-green">
                📥 Export CSV
            </button>
        </a>

        <br><br>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Customer</th>
                    <th>Date</th>

                </tr>

            </thead>

            <tbody>

                {% for sale in sales %}

                <tr>

                    <td>{{ sale[0] }}</td>
                    <td>{{ sale[1] }}</td>
                    <td>{{ sale[2] }}</td>
                    <td>KES {{ sale[3] }}</td>
                    <td>{{ sale[4] }}</td>
                    <td>{{ sale[5] }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
